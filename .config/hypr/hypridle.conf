general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances
    before_sleep_cmd = loginctl lock-session    # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on  # turn on display after wake
}

# Dim screen after 2.5 minutes
listener {
    timeout = 150                                
    on-timeout = brightnessctl set 10% -        # requires brightnessctl
    on-resume = brightnessctl set +10%          
}

# Lock screen after 5 minutes
listener {
    timeout = 300                                
    on-timeout = loginctl lock-session           
}

# Turn off screen after 5.5 minutes
listener {
    timeout = 330                                
    on-timeout = hyprctl dispatch dpms off       
    on-resume = hyprctl dispatch dpms on         
}

# Suspend system after 10 minutes
listener {
    timeout = 600                                
    on-timeout = systemctl suspend               
}
